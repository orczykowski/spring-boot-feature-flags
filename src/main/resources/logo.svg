<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" fill="none">
  <!-- Toggle switch (left) -->
  <g transform="translate(70, 60)">
    <!-- Track -->
    <rect x="-55" y="-22" width="110" height="44" rx="22"
          fill="#6DB33F" opacity="0.2"/>
    <rect x="-55" y="-22" width="110" height="44" rx="22"
          fill="none" stroke="#6DB33F" stroke-width="2.5"/>
    <!-- Knob (ON position) -->
    <circle cx="32" cy="0" r="17"
            fill="#6DB33F"/>
    <!-- ON label -->
    <text x="-20" y="5" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" font-weight="600" fill="#6DB33F">ON</text>
  </g>

  <!-- "Feature Flags" text (right, close to switch) -->
  <text x="145" y="52" text-anchor="start"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" fill="#3C3C3C"
        letter-spacing="1">Feature</text>
  <text x="145" y="82" text-anchor="start"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" fill="#3C3C3C"
        letter-spacing="1">Flags</text>
</svg>
