<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Flags Admin</title>
    <style>{{INLINE_CSS}}</style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-icon">&#9873;</span>
            <h1>Feature Flags Admin</h1>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode"></button>
    </header>

    <main class="main">
        <section class="create-section">
            <h2>Create Feature Flag</h2>
            <form class="create-form" id="create-form">
                <div class="form-group grow">
                    <label for="flag-name">Name</label>
                    <input type="text" id="flag-name" placeholder="my-feature-flag" maxlength="120" required>
                </div>
                <div class="form-group">
                    <label for="flag-state">State</label>
                    <select id="flag-state">
                        <option value="ANYBODY">ANYBODY</option>
                        <option value="NOBODY">NOBODY</option>
                        <option value="RESTRICTED">RESTRICTED</option>
                    </select>
                </div>
                <div class="form-group grow">
                    <label for="flag-users">Users <span style="font-weight:400;text-transform:none">(comma-separated, optional)</span></label>
                    <input type="text" id="flag-users" placeholder="user1, user2">
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </section>

        <section id="flags-section">
            <div class="loading" id="loading"><div class="spinner"></div></div>
            <div class="flags-list" id="flags-list"></div>
        </section>
    </main>

    <dialog id="confirm-dialog">
        <div class="dialog-title">Confirm Delete</div>
        <div class="dialog-message" id="confirm-message"></div>
        <div class="dialog-actions">
            <button class="btn btn-outline" id="confirm-cancel">Cancel</button>
            <button class="btn btn-danger" id="confirm-delete">Delete</button>
        </div>
    </dialog>

    <div class="toast-container" id="toast-container"></div>

    <footer class="footer">
        <div>spring-boot-feature-flags admin panel</div>
        <div class="footer-links">
            <a href="https://github.com/orczykowski/spring-boot-feature-flags" target="_blank" class="footer-link">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
            <a href="https://orczykowski.github.io/aboutme" target="_blank" class="footer-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                About Author
            </a>
            <a href="https://buymeacoffee.com/tasior" target="_blank" class="footer-link-coffee">
                <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" height="36">
            </a>
        </div>
    </footer>

    <script>window.FF_ADMIN_CONFIG = { apiBasePath: '{{MANAGE_API_BASE_PATH}}' };</script>
    <script>{{INLINE_JS}}</script>
</body>
</html>
